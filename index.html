<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registrationform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contact-container">
        <form action="https://api.web3forms.com/submit" method="POST" class="contact-left-title">
            <div class="contact-left-title">
                <h2>REGISTRATION FORM</h2>
                <hr>
            </div>
            <input type="hidden" name="access_key" value="15bad59e-6f1e-436c-87d8-d82443f5b097">
            <input type="text" name="name" placeholder="TEAM NAME" class="contact-inputs" required>
            <input type="email" name="Email" placeholder="YOUR EMAIL" class="contact-inputs" required>
            <input type="text" name="LEADER NAME" placeholder="LEADER NAME" class="contact-inputs" required>
            <input type="date" name="DATE OF BIRTH" placeholder="DATE OF BIRTH" class="contact-inputs" required>
            <input type="text" name="3 DROP LOCATIONS" placeholder="3 DROP LOCATIONS" class="contact-inputs" required>
            <input type="text" name="4 PLAYER DETAILS" placeholder="4 PLAYERS NAME & CHAR ID" class="contact-inputs" required>
            <button type="submit">Submit <img src="assets/arrow_icon.png" alt=""></button>
        </form>
        <div class="contact-right">
            <img src="assets/ind-main.png" alt="">
        </div>
    </div>
    
</body>
</html>
